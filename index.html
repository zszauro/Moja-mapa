<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mapa Arti - Metoda Prosta</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .przycisk { 
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            padding: 15px 25px; background: white; border: 3px solid #000;
            border-radius: 10px; font-weight: bold; font-size: 16px;
        }
    </style>
</head>
<body>

    <button class="przycisk" onclick="znajdzMnie()">GDZIE JESTEM?</button>
    <div id="map"></div>

    <script>
        // Inicjalizacja mapy
        var map = L.map('map').setView([52.23, 19.14], 6);

        // Ładowanie satelity bez żadnych kluczy API (Publiczne dane Esri)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri, Maxar, Earthstar Geographics'
        }).addTo(map);

        function powiedz(tekst) {
            var m = new SpeechSynthesisUtterance(tekst);
            m.lang = 'pl-PL';
            window.speechSynthesis.speak(m);
        }

        function znajdzMnie() {
            map.locate({setView: true, maxZoom: 16});
        }

        map.on('locationfound', function(e) {
            L.marker(e.latlng).addTo(map);
            powiedz("Szefie, widzę Cię na mapie.");
        });

        map.on('locationerror', function() {
            alert("Szefie, włącz GPS!");
        });

        // Powitanie głosowe
        window.onload = function() {
            setTimeout(function() {
                powiedz("Metoda awaryjna uruchomiona. Satelita online, Szefie.");
            }, 1000);
        };
    </script>
</body>
</html>
