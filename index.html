
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mapa Szefa Test</title>
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #333; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // SPRAWDŹ CZY TEN KLUCZ JEST IDENTYCZNY:
        const key = 'RXqehBn2Ora8xhgt9MQY';
        
        const map = new maplibregl.Map({
            container: 'map',
            // ZMIENIAMY NA STYL ULIC (Lżejszy do testu)
            style: 'https://api.maptiler.com/maps/streets/style.json?key=' + key,
            center: [19.14, 52.23],
            zoom: 6
        });

        map.addControl(new maplibregl.NavigationControl());
        
        map.on('error', function(e) {
            alert("Szefie, błąd mapy: " + e.error.message);
        });
    </script>
</body>
</html>
