
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mapa Arti</title>
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .ui { position: absolute; top: 10px; left: 10px; z-index: 10; }
        button { padding: 8px; background: white; border-radius: 5px; font-weight: bold; border: 2px solid black; }
    </style>
</head>
<body>
    <div class="ui"><button onclick="lokalizacja()">GDZIE JESTEM?</button></div>
    <div id="map"></div>
    <script>
        const key = 'RXqehBn2Ora8xhgt9MQY';
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://api.maptiler.com/maps/satellite/style.json?key=' + key,
            center: [19.14, 52.23],
            zoom: 6
        });

        function powiedz(t) {
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pl-PL';
            window.speechSynthesis.speak(m);
        }

        function lokalizacja() {
            navigator.geolocation.getCurrentPosition(p => {
                const pos = [p.coords.longitude, p.coords.latitude];
                map.flyTo({center: pos, zoom: 15});
                powiedz("Szefie, jesteś tutaj.");
            });
        }

        map.addControl(new maplibregl.NavigationControl());
        map.on('load', () => powiedz("System gotowy, Szefie. Mapa satelitarna załadowana."));
    </script>
</body>
</html>
