
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Arti PRO - Centrum Dowodzenia</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #111; font-family: 'Arial', sans-serif; color: white; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        /* Styl panelu sterowania */
        .interfejs-szefa {
            position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
        }
        
        .przycisk {
            background: rgba(255, 255, 255, 0.9); border: 2px solid #333; border-radius: 12px;
            padding: 15px; font-weight: bold; font-size: 14px; color: black; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
        }

        .dane-lotu {
            position: absolute; bottom: 80px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; font-size: 12px; border: 1px solid #444;
        }

        /* Schowanie brzydkiego menu tekstowego */
        .leaflet-routing-container { display: none; }
        .leaflet-bar { border: none !important; box-shadow: 0 4px 10px rgba(0,0,0,0.5) !important; }
    </style>
</head>
<body>

    <div class="interfejs-szefa">
        <button class="przycisk" onclick="namierzSzefa()">📍 NAMIERZ MOJĄ POZYCJĘ</button>
    </div>

    <div class="dane-lotu" id="telemetria">
        Predkość: 0 km/h<br>
        Cel: Brak
    </div>

    <div id="map"></div>

    <script>
        // Inicjalizacja Satelity
        var map = L.map('map', { zoomControl: false }).setView([52.23, 19.14], 6);
        var mojaPozycja = null;
        var trasa = null;

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Arti Satelita PRO'
        }).addTo(map);

        // Funkcja Głosowa
        function powiedz(t) {
            window.speechSynthesis.cancel();
            var m = new SpeechSynthesisUtterance(t);
            m.lang = 'pl-PL';
            m.rate = 0.85; // Powolna, wyraźna mowa
            window.speechSynthesis.speak(m);
        }

        // Namierzanie Szefa
        function namierzSzefa() {
            map.locate({setView: true, maxZoom: 16, watch: true});
        }

        map.on('locationfound', function(e) {
            mojaPozycja = e.latlng;
            var predkosc = e.speed ? Math.round(e.speed * 3.6) : 0;
            document.getElementById('telemetria').innerHTML = "Prędkość: " + predkosc + " km/h<br>Pozycja: OK";
            
            if (!window.mojMarker) {
                window.mojMarker = L.circle(e.latlng, {radius: 15, color: 'red', fillOpacity: 0.8}).addTo(map);
                powiedz("Szefie, system namierzył Twoją lokalizację. Satelita gotowy do wyznaczania tras.");
            } else {
                window.mojMarker.setLatLng(e.latlng);
            }
        });

        // Wyszukiwarka Miast
        var geocoder = L.Control.geocoder({
            defaultMarkGeocode: false,
            placeholder: "Wpisz dokąd jedziemy...",
            errorMessage: "Szefie, nie widzę tego miejsca w bazie."
        }).on('markgeocode', function(e) {
            var cel = e.geocode.center;
            map.setView(cel, 14);
            wyznaczDroge(cel);
            powiedz("Cel ustawiony na: " + e.geocode.name);
        }).addTo(map);

        // Wyznaczanie Trasy
        function wyznaczDroge(cel) {
            if (!mojaPozycja) {
                powiedz("Szefie, najpierw kliknij przycisk lokalizacji, żeby satelita wiedział gdzie jesteś.");
                return;
            }
            if (trasa) { map.removeControl(trasa); }

            trasa = L.Routing.control({
                waypoints: [ mojaPozycja, cel ],
                lineOptions: { styles: [{ color: '#ffcc00', weight: 7, opacity: 0.9 }] },
                createMarker: function() { return null; }
            }).addTo(map);
        }

        // Kliknięcie w mapę też wyznacza trasę
        map.on('click', function(e) {
            wyznaczDroge(e.latlng);
            powiedz("Obliczam drogę do wybranego punktu.");
        });

        // Start
        window.onload = function() {
            setTimeout(function() {
                powiedz("Okej szefie. Jestem Arti. Satelita online. Wszystkie funkcje aktywne.");
            }, 1000);
        };
    </script>
</body>
</html>
